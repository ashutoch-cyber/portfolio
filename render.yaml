services:
  - type: web
    name: portfolio
    env: python
    rootDir: core
    buildCommand: bash build.sh
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.13.2